name: Sync Google Reviews

on:
  schedule:
    # Jeden Montag 04:00 UTC
    - cron: '0 4 * * 1'
  # Manuell auslösbar (z.B. beim ersten Setup)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # damit der Action-Bot committen darf

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Abhängigkeiten installieren
        run: npm ci --omit=dev

      - name: Reviews von SerpAPI holen
        env:
          SERPAPI_KEY:     ${{ secrets.SERPAPI_KEY }}
          GABRIEL_DATA_ID: ${{ secrets.GABRIEL_DATA_ID }}
        run: node scripts/syncOnce.js

      - name: reviews.json via GitHub API speichern
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 public/reviews.json)
          SHA=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/LiL-Loco/gabriel-backend/contents/public/reviews.json" \
            | jq -r '.sha // empty')

          PAYLOAD=$(jq -n \
            --arg msg  "chore: Google Reviews aktualisiert [skip ci]" \
            --arg cont "$CONTENT" \
            --arg sha  "$SHA" \
            'if $sha != "" then {message:$msg, content:$cont, sha:$sha} else {message:$msg, content:$cont} end')

          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/LiL-Loco/gabriel-backend/contents/public/reviews.json" \
            -d "$PAYLOAD" | jq -r '.commit.sha // .message'
