name: Sync Google Reviews

on:
  schedule:
    # Jeden Montag 04:00 UTC
    - cron: '0 4 * * 1'
  # Manuell auslösbar (z.B. beim ersten Setup)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # damit der Action-Bot committen darf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Abhängigkeiten installieren
        run: npm ci --omit=dev

      - name: Reviews von SerpAPI holen
        env:
          SERPAPI_KEY:     ${{ secrets.SERPAPI_KEY }}
          GABRIEL_DATA_ID: ${{ secrets.GABRIEL_DATA_ID }}
        run: node scripts/syncOnce.js

      - name: reviews.json committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reviews.json
          git diff --cached --quiet && echo "Keine Änderungen" || \
            git commit -m "chore: Google Reviews aktualisiert [skip ci]" && git push
